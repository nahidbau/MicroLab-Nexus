services:
  - type: web
    name: microlab-nexus
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn microlab_nexus:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MICROLAB_SECRET
        generateValue: true
      - key: MICROLAB_DB
        value: /var/data/microlab_nexus.db
    disk:
      name: microlab-data
      mountPath: /var/data
      sizeGB: 1